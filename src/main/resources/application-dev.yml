# Spring
spring:
  config:
    import: optional:file:.env.dev[.properties]

  output:
    ansi:
      enabled: always
  
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/user-with-friends}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:mysecretpassword}
    driver-class-name: org.postgresql.Driver
    tomcat:
      test-on-borrow: true
      max-wait: 10000
      max-active: 50

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  
