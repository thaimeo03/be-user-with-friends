version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-user-with-friends
    environment:
      POSTGRES_DB: user-with-friends
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - user-with-friends-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-user-with-friends
    ports:
      - "6379:6379"
    networks:
      - user-with-friends-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: be-user-with-friends-app
    environment:
      APP_ENV: dev
      POSTGRES_URL: jdbc:postgresql://postgres:5432/user-with-friends
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: mysecretpassword
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - user-with-friends-network
    restart: unless-stopped

networks:
  user-with-friends-network:
    driver: bridge

volumes:
  postgres_data:
